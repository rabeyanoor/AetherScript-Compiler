<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>AetherScript IDE — Compiler Visualizer</title>
  <meta name="description" content="Live compiler visualizer for AetherScript. Write code, see tokens, AST tree, and output in real-time." />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Fira+Code:wght@400;500&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="style.css" />
</head>
<body>

<!-- ── HEADER ─────────────────────────────────────────────────────────────── -->
<header class="header">
  <div class="header-left">
    <div class="logo">
      <span class="logo-icon">⟨/⟩</span>
      <span class="logo-text">AetherScript <span class="logo-badge">IDE</span></span>
    </div>
  </div>
  <div class="header-center">
    <div id="status-dot" class="status-dot connected"></div>
    <span id="status-text" class="status-text">Backend Connected</span>
  </div>
  <div class="header-right">
    <button id="btn-run" class="btn btn-run" onclick="runCompile()">
      <svg width="14" height="14" viewBox="0 0 24 24" fill="currentColor"><path d="M8 5v14l11-7z"/></svg>
      Run
    </button>
    <button class="btn btn-clear" onclick="clearAll()">
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="3 6 5 6 21 6"/><path d="M19 6l-1 14H6L5 6"/><path d="M10 11v6M14 11v6"/></svg>
      Clear
    </button>
  </div>
</header>

<!-- ── MAIN LAYOUT ─────────────────────────────────────────────────────────── -->
<main class="main-layout">

  <!-- LEFT: Editor -->
  <section class="panel panel-editor">
    <div class="panel-header">
      <span class="panel-title">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="16 18 22 12 16 6"/><polyline points="8 6 2 12 8 18"/></svg>
        Code Editor
      </span>
      <span class="panel-lang">AetherScript</span>
    </div>
    <div id="editor-container" class="editor-container">
      <textarea id="code-editor" class="code-textarea" spellcheck="false" placeholder="// Write your AetherScript code here
let x = 10;
let y = 5;
if (x > y) {
  print(x);
}"></textarea>
    </div>
    <!-- Token Strip -->
    <div class="token-strip" id="token-strip">
      <span class="token-strip-label">Tokens</span>
      <div id="token-list" class="token-list">
        <span class="token-placeholder">Run code to see tokens…</span>
      </div>
    </div>
  </section>

  <!-- RIGHT: Visualizer + Console -->
  <section class="panel-right">

    <!-- AST Visualizer -->
    <div class="panel panel-ast">
      <div class="panel-header">
        <span class="panel-title">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="5" r="3"/><circle cx="5" cy="19" r="3"/><circle cx="19" cy="19" r="3"/><line x1="12" y1="8" x2="5" y2="16"/><line x1="12" y1="8" x2="19" y2="16"/></svg>
          AST Tree
        </span>
        <div class="ast-controls">
          <button class="icon-btn" onclick="zoomIn()" title="Zoom In">+</button>
          <button class="icon-btn" onclick="zoomOut()" title="Zoom Out">−</button>
          <button class="icon-btn" onclick="resetZoom()" title="Reset">⟳</button>
        </div>
      </div>
      <div id="ast-container" class="ast-container">
        <div class="ast-placeholder" id="ast-placeholder">
          <div class="ast-placeholder-icon">🌳</div>
          <p>Run your AetherScript code to visualize the Abstract Syntax Tree</p>
        </div>
        <svg id="ast-svg"></svg>
      </div>
    </div>

    <!-- Console -->
    <div class="panel panel-console">
      <div class="panel-header">
        <span class="panel-title">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="4 17 10 11 4 5"/><line x1="12" y1="19" x2="20" y2="19"/></svg>
          Output
        </span>
        <button class="icon-btn" onclick="clearConsole()">clear</button>
      </div>
      <div id="console" class="console">
        <span class="console-welcome">AetherScript Compiler v1.0 — ready.</span>
      </div>
    </div>

  </section>
</main>

<!-- ── LOADING OVERLAY ─────────────────────────────────────────────────────── -->
<div id="loading-overlay" class="loading-overlay hidden">
  <div class="spinner"></div>
  <span>Compiling…</span>
</div>

<!-- ── D3.js ───────────────────────────────────────────────────────────────── -->
<script src="https://d3js.org/d3.v7.min.js"></script>
<script src="app.js"></script>
</body>
</html>
